# Деплой на GitHub Pages — ОТКЛЮЧЁН.
# Сайт переехал на reg.ru (свой домен санаториифнпр.рф, выкладка dist/ через FTP).
# Файл оставлен на случай, если понадобится временный preview на Pages — запускается вручную.
name: Деплой на GitHub Pages (отключён)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
